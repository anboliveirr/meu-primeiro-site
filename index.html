<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Lista de Compras</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #111827 0, #020617 45%, #000 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #e5e7eb;
    }
    .app-container {
      width: 100%;
      max-width: 520px;
      padding: 32px 28px;
      border-radius: 50px;
      background: rgba(15, 23, 42, 0.88);
      box-shadow:
        0 20px 45px rgba(0, 0, 0, 0.75),
        0 0 0 1px rgba(148, 163, 184, 0.18);
      backdrop-filter: blur(20px);
    }
    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .title {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .title-pill {
      font-size: 0.7rem;
      padding: 3px 9px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.4);
      color: #7dd3fc;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .subtitle {
      font-size: 0.8rem;
      color: #9ca3af;
    }
    .input-row {
  display: flex;
  gap: 10px;
  margin-bottom: 18px;
  align-items: stretch;
}
.input-row input[type="text"] {
  flex: 1;
  padding: 10px 12px;
  border-radius: 999px;
  border: 1px solid rgba(148, 163, 184, 0.4);
  background: rgba(15, 23, 42, 0.9);
  color: #e5e7eb;
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
}
#quantityInput {
  width: 80px;       /* fixo, pequeno */
  padding: 10px 12px;
  border-radius: 999px;
  border: 1px solid rgba(148, 163, 184, 0.4);
  background: rgba(15, 23, 42, 0.9);
  color: #e5e7eb;
  font-size: 0.9rem;
  outline: none;
  text-align: center;
  transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
}
    .input-row input[type="text"]::placeholder {
      color: #6b7280;
    }
    .input-row input[type="text"]:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.4);
      background: rgba(15, 23, 42, 1);
    }
    .input-row button {
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #38bdf8, #4f46e5);
      color: #0b1120;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      box-shadow:
        0 8px 20px rgba(56, 189, 248, 0.35),
        0 0 0 1px rgba(15, 23, 42, 0.8);
      transition: transform 0.1s ease, box-shadow 0.1s ease, filter 0.1s ease;
    }
    .input-row button span {
      font-size: 1rem;
    }
    .input-row button:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
      box-shadow:
        0 12px 26px rgba(56, 189, 248, 0.45),
        0 0 0 1px rgba(15, 23, 42, 1);
    }
    .input-row button:active {
      transform: translateY(0);
      box-shadow:
        0 4px 10px rgba(15, 23, 42, 0.8),
        0 0 0 1px rgba(15, 23, 42, 1);
    }
    .table-wrapper {
      border-radius: 14px;
      border: 1px solid rgba(55, 65, 81, 0.9);
      background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.08), transparent 55%);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    thead {
      background: rgba(15, 23, 42, 0.98);
    }
    th, td {
      padding: 10px 14px;
      text-align: left;
    }
    th {
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.7rem;
      color: #9ca3af;
      border-bottom: 1px solid rgba(55, 65, 81, 1);
    }
    tbody tr {
      transition: background 0.15s ease;
    }
    tbody tr:nth-child(even) {
      background: rgba(15, 23, 42, 0.9);
    }
    tbody tr:nth-child(odd) {
      background: rgba(15, 23, 42, 0.82);
    }
    tbody tr:hover {
      background: rgba(30, 64, 175, 0.65);
    }
    tbody td {
      border-bottom: 1px solid rgba(31, 41, 55, 0.95);
      color: #e5e7eb;
    }
    tbody tr:last-child td {
      border-bottom: none;
    }
    .empty-state {
      text-align: center;
      padding: 14px;
      color: #6b7280;
      font-size: 0.8rem;
      font-style: italic;
    }
    .index-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.8);
      font-size: 0.75rem;
      color: #e5e7eb;
    }
    .action-button {
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid rgba(248, 113, 113, 0.5);
  background: rgba(153, 27, 27, 0.18);
  color: #fecaca;
  font-size: 0.7rem;
  cursor: pointer;
  transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
}
.action-button:hover {
  background: rgba(239, 68, 68, 0.25);
  border-color: rgba(248, 113, 113, 0.9);
  transform: translateY(-1px);
}
.action-button:active {
  transform: translateY(0);
}
    @media (max-width: 600px) {
      .app-container {
        margin: 16px;
        padding: 24px 18px;
      }
      .title {
        font-size: 1.2rem;
      }
      .subtitle {
        font-size: 0.75rem;
      }
      .input-row {
        flex-direction: column;
      }
      .input-row button {
        justify-content: center;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app-container">
    <header class="header">
      <div>
        <div class="title">
          Lista de Compras
          <span class="title-pill">Menos voltas no mercado, mais tempo em casa</span>
        </div>
        <p class="subtitle">Digite o item e clique em enviar para adicionar à lista.</p>
      </div>
    </header>
    <section class="input-row">
        <input
          id="itemInput"
          type="text"
          placeholder="Ex: Leite, pão integral, café..."
          autocomplete="off"
        />
        <input
          id="quantityInput"
          type="number"
          min="1"
          value="1"
          step="1"
          placeholder="Qtd"
        />
        <button id="addButton" type="button">
          <span>＋</span>
          Enviar
        </button>
      </section>
    <section class="table-wrapper">
      <table>
        <thead>
            <tr>
              <th>#</th>
              <th>Item</th>
              <th>Quantidade</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="itemsBody">
            <tr>
              <td colspan="4" class="empty-state">
                Nenhum item ainda. Comece adicionando o primeiro.
              </td>
            </tr>
          </tbody>
      </table>
    </section>
  </main>
  <script>
    const itemInput = document.getElementById("itemInput");
    const quantityInput = document.getElementById("quantityInput");
    const addButton = document.getElementById("addButton");
    const itemsBody = document.getElementById("itemsBody");
    // Atualiza os números da coluna "#"
    function atualizarIndices() {
      const chips = itemsBody.querySelectorAll(".index-chip");
      chips.forEach((chip, index) => {
        chip.textContent = index + 1;
      });
      // Se não tiver mais nenhum item, mostra o texto "Nenhum item ainda..."
      if (chips.length === 0) {
        itemsBody.innerHTML = `
          <tr>
            <td colspan="3" class="empty-state">
              Nenhum item ainda. Comece adicionando o primeiro.
            </td>
          </tr>
        `;
      }
    }
    // Remove uma linha da tabela
    function removerItem(linha) {
      linha.remove();
      atualizarIndices();
    }
    // Adiciona um novo item na tabela
    function adicionarItem() {
  const texto = itemInput.value.trim();
  if (!texto) {
    itemInput.focus();
    return;
  }
  let quantidade = parseInt(quantityInput.value, 10);
  if (isNaN(quantidade) || quantidade < 1) {
    quantidade = 1;
  }
  const linhasAtuais = itemsBody.querySelectorAll("tr");
  const primeiroEhVazio =
    linhasAtuais.length === 1 && linhasAtuais[0].querySelector(".empty-state");
  if (primeiroEhVazio) {
    itemsBody.innerHTML = "";
  }
  const novaLinha = document.createElement("tr");
  const colunaIndex = document.createElement("td");
  colunaIndex.innerHTML = '<span class="index-chip"></span>';
  const colunaItem = document.createElement("td");
  colunaItem.textContent = texto;
  const colunaQuantidade = document.createElement("td");
  colunaQuantidade.textContent = quantidade;
  const colunaAcoes = document.createElement("td");
  const botaoRemover = document.createElement("button");
  botaoRemover.textContent = "Remover";
  botaoRemover.className = "action-button";
  botaoRemover.addEventListener("click", () => removerItem(novaLinha));
  colunaAcoes.appendChild(botaoRemover);
  novaLinha.appendChild(colunaIndex);
  novaLinha.appendChild(colunaItem);
  novaLinha.appendChild(colunaQuantidade);
  novaLinha.appendChild(colunaAcoes);
  itemsBody.appendChild(novaLinha);
  atualizarIndices();
  itemInput.value = "";
  quantityInput.value = 1;
  itemInput.focus();
}
    addButton.addEventListener("click", adicionarItem);
    itemInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        adicionarItem();
      }
    });
  </script>
</body>
</html>
